name: API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke tests
        run: |
          pytest -m smoke -v             --html=reports/smoke-report.html             --self-contained-html             --tb=short             -q 2>&1 | tee /tmp/pytest_out.txt
        env:
          BASE_URL: https://dummyjson.com
      - name: Write step summary
        if: always()
        run: |
          echo "## API Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          grep -E "passed|failed|error" /tmp/pytest_out.txt | tail -3 >> $GITHUB_STEP_SUMMARY || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run regression tests
        run: |
          pytest -v             --html=reports/regression-report.html             --self-contained-html             --tb=short             -q 2>&1 | tee /tmp/pytest_reg.txt
        env:
          BASE_URL: https://dummyjson.com
      - name: Write step summary
        if: always()
        run: |
          echo "## API Regression Test Results" >> $GITHUB_STEP_SUMMARY
          grep -E "passed|failed|error" /tmp/pytest_reg.txt | tail -3 >> $GITHUB_STEP_SUMMARY || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: reports/
